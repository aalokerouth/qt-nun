<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For My Favorite Person ❤️</title>

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    text-align: center;
    max-width: 450px;
    width: 90%;
    position: relative;
}

h2 { color: #ff4d6d; }

p { color: #555; }

.btn-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 25px;
    position: relative;
    min-height: 100px;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
}

.btn-yes { background: #ff4d6d; color: white; }

.btn-no {
    background: #6c757d;
    color: white;
    position: relative;
}

.options-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 15px;
}

.option-btn {
    background: #fff0f3;
    color: #ff4d6d;
    border: 2px solid #ffb3c1;
    border-radius: 15px;
    padding: 12px;
}

.option-btn:hover {
    background: #ff4d6d;
    color: white;
}

.hidden { display: none; }

.emoji-header { font-size: 55px; }

.certificate {
    background: linear-gradient(135deg,#fff0f3,#fff);
    border: 3px dashed #ff7b93;
    padding: 15px;
    border-radius: 15px;
}

#reactionText {
    height: 25px;
    font-weight: bold;
    color: #ff4d6d;
}

/* input */
textarea {
    width: 100%;
    height: 80px;
    border-radius: 10px;
    border: 2px solid #ffb3c1;
    padding: 10px;
    resize: none;
    margin-top: 10px;
}

.heart {
    position: fixed;
    color: #ff4d6d;
    animation: floatUp linear infinite;
    opacity: 0.6;
}

@keyframes floatUp {
    from { transform: translateY(100vh); }
    to { transform: translateY(-120px); }
}
</style>
</head>

<body>

<!-- SCREEN 1 -->
<div id="screen1" class="card">
    <div class="emoji-header">🥺</div>
    <h2>Rag kole achis?</h2>

    <div class="btn-container">
        <button class="btn-yes" onclick="goToScreen2()">No 😇</button>

        <button class="btn-no"
            id="yesBtn"
            ontouchstart="moveYesButton(event)"
            onmouseover="moveYesButton(event)">
            Yes 😈
        </button>
    </div>
</div>

<!-- SCREEN 2 -->
<div id="screen2" class="card hidden">
    <div class="emoji-header">🥰</div>
    <h2>Choo Sweet!</h2>
    <p>What do you want to eat? ❤️</p>

    <p id="reactionText"></p>

    <div class="options-list">
        <button class="option-btn" onclick="goToScreen3('🍜 Noodles')">🍜 Noodles</button>
        <button class="option-btn" onclick="goToScreen3('🍕 Pizza')">🍕 Pizza</button>
        <button class="option-btn" onclick="goToScreen3('🍔 Burger')">🍔 Burger</button>
        <button class="option-btn" onclick="goToScreen3('🍨 Ice Cream')">🍨 Ice Cream</button>
    </div>
</div>

<!-- SCREEN 3 -->
<div id="screen3" class="card hidden">
    <div class="emoji-header">👑</div>
    <h2>Almost Done!</h2>

    <p>Write something special 💌</p>

    <textarea id="customMsg" placeholder="Type your message here..."></textarea>

    <p>Now pick punishment 😏</p>

    <div class="options-list">
        <button class="option-btn" onclick="goToFinalScreen('💖 Hug')">💖 Hug</button>
        <button class="option-btn" onclick="goToFinalScreen('💆 Massage')">💆 Massage</button>
        <button class="option-btn" onclick="goToFinalScreen('🍦 Ice Cream')">🍦 Ice Cream</button>
    </div>
</div>

<!-- SCREEN 4 -->
<div id="screen4" class="card hidden">
    <div class="emoji-header">💖</div>
    <h2>Mission Accomplished!</h2>

    <div class="certificate">
        <h3 style="color:#ff4d6d;">Love Certificate ❤️</h3>
        <p id="summaryText"></p>

        <p id="customTextShow"></p>

        <div>❤️ 🌹 ❤️</div>
    </div>
</div>

<script>
let chosenFood = "";
let customMessage = "";
let textIndex = 0;

const funnyTexts = [
    "Nope 😆",
    "Try again 😏",
    "Catch me 😜",
    "Not possible 😂"
];

function moveYesButton(event) {
    const btn = document.getElementById("yesBtn");
    const container = document.querySelector(".btn-container");

    const rect = container.getBoundingClientRect();

    let x = event.touches?.[0]?.clientX || event.clientX || rect.left;
    let y = event.touches?.[0]?.clientY || event.clientY || rect.top;

    let dx = (btn.offsetLeft - x);
    let dy = (btn.offsetTop - y);

    const dist = Math.sqrt(dx*dx + dy*dy) || 1;

    dx /= dist;
    dy /= dist;

    let newX = btn.offsetLeft + dx * 120;
    let newY = btn.offsetTop + dy * 120;

    newX = Math.max(0, Math.min(container.clientWidth - 100, newX));
    newY = Math.max(0, Math.min(80, newY));

    btn.style.position = "absolute";
    btn.style.left = newX + "px";
    btn.style.top = newY + "px";

    btn.innerText = funnyTexts[textIndex++ % funnyTexts.length];
}

function goToScreen2() {
    document.getElementById("screen1").classList.add("hidden");
    document.getElementById("screen2").classList.remove("hidden");
}

function goToScreen3(food) {
    chosenFood = food;

    const reactions = {
        "🍜 Noodles": "Yummy noodles 😋",
        "🍕 Pizza": "Cheesy heaven 🍕😍",
        "🍔 Burger": "Big bite energy 🍔🔥",
        "🍨 Ice Cream": "Sweet treat 🍦🥺"
    };

    document.getElementById("reactionText").innerText =
        reactions[food] || "Yummy choice 😍";

    setTimeout(() => {
        document.getElementById("screen2").classList.add("hidden");
        document.getElementById("screen3").classList.remove("hidden");
    }, 900);
}

function goToFinalScreen(punishment) {
    customMessage = document.getElementById("customMsg").value;

    document.getElementById("screen3").classList.add("hidden");
    document.getElementById("screen4").classList.remove("hidden");

    document.getElementById("summaryText").innerHTML = `
        🍽️ <b>Food:</b> ${chosenFood}<br>
        🎁 <b>Punishment:</b> ${punishment}<br>
        📅 <b>Date:</b> ${new Date().toLocaleDateString()}
    `;

    document.getElementById("customTextShow").innerHTML =
        customMessage ? `💌 <i>${customMessage}</i>` : "";

    setTimeout(downloadCard, 1000);
}

function downloadCard() {
    const card = document.getElementById("screen4");

    html2canvas(card).then(canvas => {
        const link = document.createElement("a");
        link.download = "love-card.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}
</script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>
