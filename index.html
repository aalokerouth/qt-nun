<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Amar sona puku ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffe5ec,#ffc2d1);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    overflow:hidden;
    position: relative;
}

/* Floating background elements */
.heart-bg {
    position: absolute;
    font-size: 20px;
    animation: floatUp 6s linear infinite;
    opacity: 0.6;
    bottom: -50px;
    z-index: 0;
    user-select: none;
    pointer-events: none;
}

@keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
}

/* Progress Tracker Bar */
.progress-container {
    width: 100%;
    background-color: #ffe5ec;
    border-radius: 10px;
    margin-bottom: 20px;
    overflow: hidden;
    height: 8px;
    display: flex;
}
.progress-bar {
    width: 25%;
    background: linear-gradient(90deg, #ffb3c1, #ff4d6d);
    height: 100%;
    transition: width 0.5s ease;
}

.card {
    background:#fff;
    padding:25px;
    border-radius:18px;
    width:90%;
    max-width:450px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.12);
    z-index: 10;
    transition: all 0.3s ease;
    position: relative;
}

.hidden { display:none; }

h2 { color:#ff4d6d; }

.btn-container {
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
    position:relative;
    min-height:90px;
}

button {
    padding:10px 18px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    font-weight:bold;
    transition: transform 0.1s ease;
}

button:active { transform: scale(0.95); }

.btn-yes { background:#ff4d6d; color:#fff; }
.btn-no { background:#6c757d; color:#fff; position:absolute; transition: left 0.15s ease, top 0.15s ease; }

.option-btn {
    background:#fff0f3;
    border:2px solid #ffb3c1;
    color:#ff4d6d;
    padding:10px;
    border-radius:12px;
    margin:6px 0;
    width:100%;
    text-align: center;
    transition: all 0.2s ease;
    position: relative;
}

.option-btn.active {
    background:#ff4d6d;
    color:#fff;
    border-color: #ff4d6d;
    transform: scale(1.02);
}

textarea {
    width:100%;
    height:80px;
    border-radius:10px;
    border:2px solid #ffb3c1;
    padding:10px;
    margin-top:10px;
    resize:none;
    outline: none;
}
textarea:focus { border-color: #ff4d6d; }

#reaction {
    height:20px;
    font-weight:bold;
    color:#ff4d6d;
    margin-bottom: 15px;
}

.next-btn {
    margin-top:15px;
    background:#ff4d6d;
    color:white;
    width: 100%;
}

/* Specific styling for the card area that will be converted to a PNG image */
#downloadable-card-area {
    background: #ffffff;
    padding: 20px;
    border-radius: 14px;
    border: 2px dashed #ffb3c1;
    margin-top: 15px;
}

#result {
    text-align: left;
    background: #fff0f3;
    padding: 15px;
    border-radius: 12px;
    line-height: 1.6;
    color: #333;
    min-height: 120px;
}

.warning-msg {
    color: #ff4d6d;
    font-weight: bold;
    text-align: center;
    background: #fff;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #ffccd5;
    margin-bottom: 15px;
}

.download-notice {
    margin-top: 15px;
    font-size: 13px;
    color: #6c757d;
    font-style: italic;
}

.fallback-btn {
    margin-top: 8px;
    background: #28a745;
    color: white;
    width: 100%;
    font-size: 13px;
    padding: 6px 12px;
}

/* Particle effect style */
.click-particle {
    position: absolute;
    pointer-events: none;
    font-size: 20px;
    animation: particleExplode 0.6s ease-out forwards;
}

/* Yehh Text Explosion Style */
.yehh-blast {
    position: absolute;
    color: #ff4d6d;
    font-weight: 900;
    font-size: 28px;
    text-shadow: 2px 2px 0px #fff;
    pointer-events: none;
    z-index: 100;
    animation: yehhFlyUp 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

@keyframes yehhFlyUp {
    0% { transform: translate(-50%, -50%) scale(0.3) rotate(-20deg); opacity: 0; }
    30% { transform: translate(-50%, -100px) scale(1.3) rotate(10deg); opacity: 1; }
    100% { transform: translate(-50%, -160px) scale(1) rotate(0deg); opacity: 0; }
}

@keyframes particleExplode {
    0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    100% { transform: translate(var(--twx), var(--twy)) scale(1.4); opacity: 0; }
}

</style>
</head>

<body>

<div class="card">
    <!-- Progress Indicator Bar -->
    <div class="progress-container">
        <div id="pBar" class="progress-bar"></div>
    </div>

    <!-- SCREEN 1 -->
    <div id="s1">
        <h2>🥺 Rag kole achis?</h2>

        <div class="btn-container">
            <button class="btn-yes" onclick="go2(event)">Ekdm Na😇</button>

            <button class="btn-no" id="yesBtn"
                style="left: 160px; top: 0px;"
                ontouchstart="runAway(event)"
                onmouseover="runAway(event)">
                Yes 😈
            </button>
        </div>
    </div>

    <!-- SCREEN 2 FOOD -->
    <div id="s2" class="hidden">
        <h2>🍽️Ki khaba Bachu</h2>

        <p id="reaction"></p>

        <div>
            <button class="option-btn" onclick="food('Fich Fry','Darao anchi OM theke', event)">Fish Fry Khabi? 🐟</button>
            <button class="option-btn" onclick="food('🍜 Chow and Mau','Yummy noodles 😋', event)">Mix Schezwuan Chow 🍜</button>
            <button class="option-btn" onclick="food('🍔 Burgir','Cholo kheye achi🍔🔥', event)">Burgir Khaba 🥹</button>
            <button class="option-btn" onclick="food('🍨 Ice Cream hmmm','Paisa kom ache but tomar jonno sob🥹', event)">Arun kakur Ice cream? 🍨</button>
            <button class="option-btn" onclick="food('😍 Paisar ovab😭','Tomar jonno sob kichu bachhu', event)">Sob 😡</button>
        </div>
    </div>

    <!-- SCREEN 3 PUNISHMENT -->
    <div id="s3" class="hidden">
        <h2>😏 Pick punishments (Ekta ba Duto ba Tinte)</h2>

        <button class="option-btn" onclick="toggle(this,'Puku 💆🏻‍♀️', event)">Puku massage 💆🏻‍♀️💖</button>
        <button class="option-btn" onclick="toggle(this,'Full body Kissu 😘', event)">Full body Kiss 😘</button>
        <button class="option-btn" onclick="toggle(this,'Back Massage 15 min💆', event)">Back Massage 💆15 min</button>
        <button class="option-btn" onclick="toggle(this,'Ghurte giye Ice cream khawa', event)">Continuous Ice Cream 🍦</button>
        <button class="option-btn" onclick="toggle(this,'Queen Treatment👑', event)">Rani Treatment👑</button>
        <button class="option-btn" onclick="toggle(this,'Bike chalano sekha🏍️', event)">Bike chalano sekha🏍️</button>

        <button class="next-btn" onclick="go4()">Next ➡️</button>
    </div>

    <!-- SCREEN 4 CUSTOM -->
    <div id="s4" class="hidden">
        <h2>💌 Ar kichu bacha 🫠?</h2>

        <textarea id="msg" placeholder="lekho ekhane...."></textarea>

        <button class="next-btn" onclick="final()">Magic Card 💖</button>
    </div>

    <!-- SCREEN 5 CARD -->
    <div id="s5" class="hidden">
        <div id="downloadable-card-area">
            <h2 style="margin-top:0;">💖 Labuu Card</h2>
            <div id="result"></div>
        </div>
        
        <p class="download-notice">✨ Jeta download hche pathao amay noile kaj hobeni😝</p>
        <button class="fallback-btn" onclick="downloadCard()">Eta patha whachapp ee📱</button>
    </div>
</div>

<script>
let foodChosen = "";
let punishments = [];
let textIndex = 0;

const yesTexts = ["Yes😠","Chotti?","Pabbi na dhotte😜","Thakte pabbina😂","Dhole dekha😏"];

// Built-in Synth Sound Effects Generator
let audioCtx = null;
function playSound(type) {
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'click') {
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'transition') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        } else if (type === 'win') {
            [523.25, 659.25, 783.99, 1046.50].forEach((f, idx) => {
                let o = audioCtx.createOscillator();
                let g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.frequency.setValueAtTime(f, audioCtx.currentTime + (idx * 0.1));
                g.gain.setValueAtTime(0.1, audioCtx.currentTime + (idx * 0.1));
                g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + (idx * 0.1) + 0.3);
                o.start(o.currentTime); o.stop(audioCtx.currentTime + (idx * 0.1) + 0.3);
            });
        }
    } catch(e) {}
}

function spawnParticles(e, emoji) {
    const targetEmoji = emoji || '❤️';
    for(let i=0; i<6; i++) {
        let p = document.createElement('div');
        p.classList.add('click-particle');
        p.innerText = targetEmoji;
        p.style.left = (e.clientX || e.touches?.[0]?.clientX || window.innerWidth/2) + 'px';
        p.style.top = (e.clientY || e.touches?.[0]?.clientY || window.innerHeight/2) + 'px';
        
        let twX = (Math.random() - 0.5) * 160 + 'px';
        let twY = (Math.random() - 0.5) * 160 + 'px';
        p.style.setProperty('--twx', twX);
        p.style.setProperty('--twy', twY);
        
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 600);
    }
}

// Ambient Floating Background System
const expressions = ['❤️', '💖', '✨', '🌸', '🍕', '🍦'];
setInterval(() => {
    const heart = document.createElement('div');
    heart.classList.add('heart-bg');
    heart.innerText = expressions[Math.floor(Math.random() * expressions.length)];
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 4) + "s";
    heart.style.fontSize = (Math.random() * 15 + 15) + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 7000);
}, 600);

function runAway(e){
    e.preventDefault();
    const btn = document.getElementById("yesBtn");
    
    let randomX = Math.floor(Math.random() * 240);
    let randomY = Math.floor(Math.random() * 60);

    btn.style.left = randomX + "px";
    btn.style.top = randomY + "px";

    btn.innerText = yesTexts[textIndex++ % yesTexts.length];
    playSound('click');
}

function updateProgress(percent) {
    document.getElementById("pBar").style.width = percent + "%";
}

function go2(e){
    playSound('transition');
    
    // Yehh !! text pop-up creation
    let el = document.createElement('div');
    el.classList.add('yehh-blast');
    el.innerText = "Yehh !! 🎉";
    el.style.left = (e.clientX || window.innerWidth / 2) + 'px';
    el.style.top = (e.clientY || window.innerHeight / 2) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);

    confetti({
        particleCount: 100,
        spread: 70,
        origin: { y: 0.6 },
        colors: ['#ff4d6d', '#ffb3c1', '#ffe5ec']
    });

    setTimeout(() => {
        s1.classList.add("hidden");
        s2.classList.remove("hidden");
        updateProgress(50);
    }, 2000);
}

function food(f,t, e){
    foodChosen = f;
    document.getElementById("reaction").innerText = t;
    playSound('click');
    spawnParticles(e, '✨');

    setTimeout(()=>{
        playSound('transition');
        s2.classList.add("hidden");
        s3.classList.remove("hidden");
        updateProgress(75);
    }, 3000);
}

function toggle(el,val, e){
    el.classList.toggle("active");
    playSound('click');
    spawnParticles(e, '💖');

    if(punishments.includes(val)){
        punishments = punishments.filter(x=>x!==val);
    } else {
        punishments.push(val);
    }
}

function go4(){
    playSound('transition');
    setTimeout(() => {
        s3.classList.add("hidden");
        s4.classList.remove("hidden");
        updateProgress(90);
    }, 2000);
}

// Typing engine configuration to process elements character by character smoothly
function typeHTML(element, htmlText, delay, callback) {
    let currentText = "";
    let i = 0;
    let inTag = false;

    function step() {
        if (i >= htmlText.length) {
            if(callback) callback();
            return;
        }
        
        let char = htmlText[i];
        if (char === '<') inTag = true;
        
        currentText += char;
        
        if (char === '>') inTag = false;
        
        element.innerHTML = currentText;
        i++;
        
        if (inTag) {
            step(); 
        } else {
            setTimeout(step, delay);
        }
    }
    step();
}

function final(){
    let msg = document.getElementById("msg").value;
    playSound('transition');

    setTimeout(() => {
        s4.classList.add("hidden");
        s5.classList.remove("hidden");
        updateProgress(100);

        // Raw HTML blueprint target formatted specifically for the typewriter loop
        const finalHTML = `
            <div class="warning-msg">😏 Ebarer moto chere dilam, porer bar kore dekh</div>
            🍽️ <b>Food:</b> ${foodChosen || "Kichu na 🥺"}<br><br>
            😏 <b>Punishments:</b> ${punishments.join(" ar ") || "None 😇"}<br><br>
            💌 <b>Message:</b> ${msg || "No message 😭"}
        `;

        const resultContainer = document.getElementById("result");
        resultContainer.innerHTML = ""; 

        // Typewriter runs smoothly, triggering high-fidelity download generation once complete
        typeHTML(resultContainer, finalHTML, 15, () => {
            setTimeout(() => {
                downloadCard();
            }, 500);
        });

        playSound('win');

        let duration = 2 * 1000;
        let end = Date.now() + duration;

        (function frame() {
          confetti({
            particleCount: 3,
            angle: 60,
            spread: 55,
            origin: { x: 0 },
            colors: ['#ff4d6d', '#ffb3c1', '#ffccd5']
          });
          confetti({
            particleCount: 3,
            angle: 120,
            spread: 55,
            origin: { x: 1 },
            colors: ['#ff4d6d', '#ffb3c1', '#ffccd5']
          });

          if (Date.now() < end) {
            requestAnimationFrame(frame);
          }
        }());
    }, 3000);
}

function downloadCard() {
    const cardArea = document.getElementById('downloadable-card-area');
    
    html2canvas(cardArea, {
        backgroundColor: '#ffffff',
        scale: 2
    }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'Labuu_Card.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
}
</script>

</body>
</html>
