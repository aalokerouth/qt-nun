<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For My Favorite Person ❤️</title>

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
    position: relative;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    text-align: center;
    max-width: 450px;
    width: 90%;
    position: relative;
    z-index: 2;
}

h2 { color: #ff4d6d; margin-bottom: 15px; }

p { color: #555; line-height: 1.6; }

.btn-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 25px;
    position: relative;
    min-height: 100px;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
}

.btn-yes {
    background: #ff4d6d;
    color: white;
}

.btn-no {
    background: #6c757d;
    color: white;
    position: relative;
}

.options-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 20px;
}

.option-btn {
    background: #fff0f3;
    color: #ff4d6d;
    border: 2px solid #ffb3c1;
    border-radius: 15px;
    padding: 12px;
    text-align: left;
}

.option-btn:hover {
    background: #ff4d6d;
    color: white;
}

.hidden { display: none; }

.emoji-header { font-size: 55px; margin-bottom: 10px; }

.certificate {
    background: linear-gradient(135deg, #fff0f3, #ffffff);
    border: 3px dashed #ff7b93;
    padding: 15px;
    border-radius: 15px;
    margin-top: 15px;
}

.heart {
    position: fixed;
    color: #ff4d6d;
    font-size: 24px;
    animation: floatUp linear infinite;
    opacity: 0.6;
    z-index: 1;
}

@keyframes floatUp {
    from { transform: translateY(100vh); }
    to { transform: translateY(-120px); }
}
</style>
</head>

<body>

<div id="screen1" class="card">
    <div class="emoji-header">🥺</div>
    <h2>Rag kole achis?</h2>
    <p>I know you're mad, but please be honest...</p>

    <div class="btn-container">
        <button class="btn-yes" onclick="goToScreen2()">No 😇</button>

        <button class="btn-no"
            id="yesBtn"
            ontouchstart="moveYesButton(event)"
            onmouseover="moveYesButton(event)"
            onclick="moveYesButton(event)">
            Yes 😈
        </button>
    </div>
</div>

<div id="screen2" class="card hidden">
    <div class="emoji-header">🥰</div>
    <h2>Choo Sweet!</h2>
    <p>Now tell me what you want to eat ❤️</p>

    <div class="options-list">
        <button class="option-btn" onclick="goToScreen3('🍜 Mix Noodles')">🍜 Mix Noodles</button>
        <button class="option-btn" onclick="goToScreen3('🐟 Crispy Fish Fries')">🐟 Crispy Fish Fries</button>
        <button class="option-btn" onclick="goToScreen3('🍕 Pizza')">🍕 Pizza</button>
        <button class="option-btn" onclick="goToScreen3('🍔 Burger & Fries')">🍔 Burger</button>
        <button class="option-btn" onclick="goToScreen3('🍨 Ice Cream')">🍨 Ice Cream</button>
    </div>
</div>

<div id="screen3" class="card hidden">
    <div class="emoji-header">👑</div>
    <h2>Food Locked In!</h2>

    <p>Pick my punishment 😅</p>

    <div class="options-list">
        <button class="option-btn" onclick="goToFinalScreen('💖 Khub Ador')">💖 Khub Ador</button>
        <button class="option-btn" onclick="goToFinalScreen('💆‍♂️ Massage')">💆‍♂️ Massage</button>
        <button class="option-btn" onclick="goToFinalScreen('🤫 Listen to everything')">🤫 Listen to me</button>
        <button class="option-btn" onclick="goToFinalScreen('🍦 Ice Cream Treat')">🍦 Ice Cream</button>
    </div>
</div>

<div id="screen4" class="card hidden">
    <div class="emoji-header">💖</div>
    <h2>Mission Accomplished!</h2>

    <div class="certificate">
        <h3 style="color:#ff4d6d;">Love Certificate ❤️</h3>
        <p id="summaryText"></p>

        <p><strong>Your puku is officially on pamper duty 🥰</strong></p>

        <div style="font-size:40px;">❤️ 🌹 ❤️</div>
    </div>
</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
let chosenFood = "";
let textIndex = 0;

const funnyTexts = [
    "Really?",
    "Sure?",
    "Think Again",
    "Nope",
    "Catch Me",
    "Not Happening"
];

function moveYesButton(event) {
    const btn = document.getElementById("yesBtn");
    const container = document.querySelector(".btn-container");

    const rect = container.getBoundingClientRect();

    let x, y;

    if (event.touches && event.touches.length > 0) {
        x = event.touches[0].clientX;
        y = event.touches[0].clientY;
    } else if (event.clientX && event.clientY) {
        x = event.clientX;
        y = event.clientY;
    } else {
        x = rect.left + rect.width / 2;
        y = rect.top + rect.height / 2;
    }

    const btnRect = btn.getBoundingClientRect();

    let dx = (btnRect.left + btnRect.width / 2) - x;
    let dy = (btnRect.top + btnRect.height / 2) - y;

    const distance = Math.sqrt(dx * dx + dy * dy) || 1;
    dx /= distance;
    dy /= distance;

    const moveDistance = 140;

    let newX = btn.offsetLeft + dx * moveDistance;
    let newY = btn.offsetTop + dy * moveDistance;

    const maxX = container.clientWidth - btn.offsetWidth;
    const maxY = container.clientHeight - btn.offsetHeight;

    newX = Math.max(0, Math.min(maxX, newX));
    newY = Math.max(0, Math.min(maxY, newY));

    btn.style.position = "absolute";
    btn.style.left = newX + "px";
    btn.style.top = newY + "px";

    btn.innerText = funnyTexts[textIndex % funnyTexts.length] + " 😈";
    textIndex++;
}

function goToScreen2() {
    document.getElementById('screen1').classList.add('hidden');
    document.getElementById('screen2').classList.remove('hidden');
}

function goToScreen3(food) {
    chosenFood = food;
    document.getElementById('screen2').classList.add('hidden');
    document.getElementById('screen3').classList.remove('hidden');
}

function goToFinalScreen(punishment) {
    document.getElementById('screen3').classList.add('hidden');
    document.getElementById('screen4').classList.remove('hidden');

    document.getElementById('summaryText').innerHTML = `
        🍽️ <strong>Food:</strong> ${chosenFood}<br><br>
        🎁 <strong>Punishment:</strong> ${punishment}<br><br>
        📅 <strong>Date:</strong> ${new Date().toLocaleDateString()}
    `;

    setTimeout(downloadFinalCard, 1000);
}

async function downloadFinalCard() {
    const card = document.getElementById('screen4');

    const canvas = await html2canvas(card, {
        scale: 3,
        backgroundColor: "#ffffff"
    });

    const image = canvas.toDataURL("image/png");

    const link = document.createElement('a');
    link.href = image;
    link.download = "Love-Certificate.png";

    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

function createHearts() {
    for (let i = 0; i < 20; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (4 + Math.random() * 5) + "s";
        heart.style.animationDelay = Math.random() * 5 + "s";

        document.body.appendChild(heart);
    }
}

createHearts();
</script>

</body>
</html>
