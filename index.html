<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Amar sona puku ❤️</title>

<style>
* { box-sizing: border-box; }

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffe5ec,#ffc2d1);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    overflow:hidden;
}

.card {
    background:#fff;
    padding:25px;
    border-radius:18px;
    width:90%;
    max-width:450px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.12);
}

.hidden { display:none; }

h2 { color:#ff4d6d; }

.btn-container {
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
    position:relative;
    min-height:90px;
}

button {
    padding:10px 18px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    font-weight:bold;
}

.btn-yes { background:#ff4d6d; color:#fff; }
.btn-no { background:#6c757d; color:#fff; position:relative; }

.option-btn {
    background:#fff0f3;
    border:2px solid #ffb3c1;
    color:#ff4d6d;
    padding:10px;
    border-radius:12px;
    margin:6px 0;
    width:100%;
}

.option-btn.active {
    background:#ff4d6d;
    color:#fff;
}

textarea {
    width:100%;
    height:80px;
    border-radius:10px;
    border:2px solid #ffb3c1;
    padding:10px;
    margin-top:10px;
    resize:none;
}

#reaction {
    height:20px;
    font-weight:bold;
    color:#ff4d6d;
}

.next-btn {
    margin-top:15px;
    background:#ff4d6d;
    color:white;
}

</style>
</head>

<body>

<!-- SCREEN 1 -->
<div id="s1" class="card">
    <h2>🥺 Rag kole achis?</h2>

    <div class="btn-container">
        <button class="btn-yes" onclick="go2()">Ekdm Na😇</button>

        <button class="btn-no" id="yesBtn"
            ontouchstart="runAway(event)"
            onmouseover="runAway(event)">
            Yes 😈
        </button>
    </div>
</div>

<!-- SCREEN 2 FOOD -->
<div id="s2" class="card hidden">
    <h2>🍽️Ki khaba Bachu</h2>

    <p id="reaction"></p>

    <div>
        <button class="option-btn" onclick="food('Fich Fry','Darao anchi OM theke')">Fish Fry Khabi? 🐟</button>
        <button class="option-btn" onclick="food('🍜 Chow and Mau','Yummy noodles 😋')">Mix Schezwuan Chow 🍜</button>
        <button class="option-btn" onclick="food('🍔 Burgir','Cholo kheye achi🍔🔥')">Burgir Khaba 🥹</button>
        <button class="option-btn" onclick="food('🍨 Ice Cream hmmm','Paisa kom ache but tomar jonno sob🥹')">Arun kakur Ice cream? 🍨</button>
        <button class="option-btn" onclick="food('😍 Paisar ovab😭','Tomar jonno sob kichu bachhu')">Sob 😡</button>
    </div>
</div>

<!-- SCREEN 3 PUNISHMENT -->
<div id="s3" class="card hidden">
    <h2>😏 Pick punishments (Ekta ba Duto ba Tinte)</h2>

    <button class="option-btn" onclick="toggle(this,'Puku 💆🏻‍♀️')">Puku massage 💆🏻‍♀️💖</button>
    <button class="option-btn" onclick="toggle(this,'Full body Kissu 😘')">Full body Kiss 😘</button>
    <button class="option-btn" onclick="toggle(this,'Back Massage 15 min💆')">Back Massage 💆15 min</button>
    <button class="option-btn" onclick="toggle(this,'Ghurte giye Ice cream khawa')">Continuous Ice Cream 🍦</button>
    <button class="option-btn" onclick="toggle(this,'Queen Treatment👑')">Rani Treatment👑</button>
    <button class="option-btn" onclick="toggle(this,'Bike chalano sekha🏍️')">Bike chalano sekha🏍️</button>

    <button class="next-btn" onclick="go4()">Next ➡️</button>
</div>

<!-- SCREEN 4 CUSTOM -->
<div id="s4" class="card hidden">
    <h2>💌 Ar kichu bacha 🫠?</h2>

    <textarea id="msg" placeholder="lekho ekhane...."></textarea>

    <button class="next-btn" onclick="final()">Magic Card 💖</button>
</div>

<!-- SCREEN 5 CARD -->
<div id="s5" class="card hidden">
    <h2>💖 Labuu Card</h2>

    <div id="result"></div>
</div>

<script>
let foodChosen = "";
let punishments = [];
let textIndex = 0;

const yesTexts = ["Yes😇","Chotti?","Pabbi na😜","Thakte pabbina😂","Dhole dekha😏"];

function runAway(e){
    const btn = document.getElementById("yesBtn");
    const box = document.querySelector(".btn-container");

    let x = e.touches?.[0]?.clientX || e.clientX;
    let y = e.touches?.[0]?.clientY || e.clientY;

    let bx = btn.offsetLeft;
    let by = btn.offsetTop;

    let dx = bx - x;
    let dy = by - y;

    let dist = Math.sqrt(dx*dx+dy*dy)||1;

    dx/=dist; dy/=dist;

    let nx = btn.offsetLeft + dx*120;
    let ny = btn.offsetTop + dy*120;

    btn.style.position="absolute";
    btn.style.left = Math.max(0, Math.min(250,nx))+"px";
    btn.style.top = Math.max(0, Math.min(80,ny))+"px";

    btn.innerText = yesTexts[textIndex++%yesTexts.length];
}

function go2(){
    s1.classList.add("hidden");
    s2.classList.remove("hidden");
}

function food(f,t){
    foodChosen = f;
    document.getElementById("reaction").innerText = t;

    setTimeout(()=>{
        s2.classList.add("hidden");
        s3.classList.remove("hidden");
    },800);
}

function toggle(el,val){
    el.classList.toggle("active");

    if(punishments.includes(val)){
        punishments = punishments.filter(x=>x!==val);
    } else {
        punishments.push(val);
    }
}

function go4(){
    s3.classList.add("hidden");
    s4.classList.remove("hidden");
}

function final(){
    let msg = document.getElementById("msg").value;

    s4.classList.add("hidden");
    s5.classList.remove("hidden");

    document.getElementById("result").innerHTML = `
        🍽️ <b>Food:</b> ${foodChosen}<br><br>
        😏 <b>Punishments:</b> ${punishments.join(", ") || "None 😇"}<br><br>
        💌 <b>Message:</b> ${msg || "No message 😭"}
    `;
}
</script>

</body>
</html>
