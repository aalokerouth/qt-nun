<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Amar sona puku ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #efeae2; /* WhatsApp classic light background */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
    position: relative;
}

/* --- BOOTLOADER STYLING --- */
#boot-screen {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: #000;
    color: #00ff00;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    padding: 20px;
}
.boot-terminal {
    width: 100%;
    max-width: 400px;
    text-align: left;
}
.loading-track {
    width: 100%;
    height: 10px;
    background: #222;
    border-radius: 5px;
    margin-top: 15px;
    overflow: hidden;
}
.loading-fill {
    width: 0%;
    height: 100%;
    background: #00ff00;
    transition: width 0.1s linear;
}

/* --- LOGIN SCREEN --- */
#login-screen {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: linear-gradient(135deg,#ffe5ec,#ffc2d1);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}
.login-box {
    background: #fff;
    padding: 30px;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
    max-width: 350px;
    width: 90%;
}
.login-box input {
    width: 100%;
    padding: 12px;
    border: 2px solid #ffb3c1;
    border-radius: 10px;
    margin-top: 10px;
    text-align: center;
    font-size: 16px;
    outline: none;
}
.login-box button {
    margin-top: 15px;
    background: #ff4d6d;
    color: white;
    width: 100%;
}

/* --- MAIN MOBILE/WHATSAPP FRAME --- */
.phone-container {
    width: 100%;
    max-width: 450px;
    height: 100vh;
    background: #efeae2;
    display: flex;
    flex-direction: column;
    position: relative;
    box-shadow: 0 0 20px rgba(0,0,0,0.1);
}

/* WhatsApp Header */
.wa-header {
    background: #075e54;
    color: white;
    padding: 15px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: bold;
    z-index: 50;
}
.wa-avatar {
    width: 40px;
    height: 40px;
    background: #fff0f3;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
}
.wa-status {
    font-size: 12px;
    color: #dcf8c6;
    font-weight: normal;
}

/* Chat Engine Window Area */
.chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-bottom: 100px;
}

/* Chat Bubble Mechanics */
.bubble {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.4;
    position: relative;
    animation: bubblePop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}
.bubble.incoming {
    background: #fff;
    align-self: flex-start;
    border-top-left-radius: 0;
}
.bubble.outgoing {
    background: #dcf8c6;
    align-self: flex-end;
    border-top-right-radius: 0;
}
@keyframes bubblePop {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* Target Graphic Assets Styling inside Window */
.inline-food-img {
    width: 100%;
    max-height: 140px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 6px;
}

/* Bottom Actions Control Drawer */
.action-drawer {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    background: #f0f0f0;
    padding: 12px;
    border-top: 1px solid #ddd;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 50vh;
    overflow-y: auto;
    z-index: 100;
}

button {
    padding: 12px 18px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    transition: transform 0.1s ease;
}
button:active { transform: scale(0.95); }

.reply-btn {
    background: #fff;
    border: 1px solid #b3cbd6;
    color: #075e54;
    text-align: left;
    border-radius: 10px;
    width: 100%;
}
.reply-btn:hover {
    background: #e1f3fb;
}
.reply-btn.active {
    background: #075e54;
    color: #fff;
}

/* Runaway Target Setup */
.runaway-wrap {
    position: relative;
    min-height: 50px;
    width: 100%;
}
.btn-no-run {
    background:#6c757d; 
    color:#fff; 
    position: absolute; 
    transition: left 0.15s ease, top 0.15s ease;
}

/* Custom Output Highlight Structures */
#downloadable-card-area {
    background: #ffffff;
    padding: 20px;
    border-radius: 14px;
    border: 2px dashed #ffb3c1;
}
#result {
    text-align: left;
    background: #fff0f3;
    padding: 15px;
    border-radius: 12px;
    line-height: 1.6;
    color: #333;
}
.warning-msg {
    color: #ff4d6d;
    font-weight: bold;
    text-align: center;
    background: #fff;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #ffccd5;
    margin-bottom: 15px;
}

/* --- SECRET LETTER OVERLAY --- */
#secret-letter-overlay {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: linear-gradient(135deg, #1a0005, #4a0010);
    z-index: 2000;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}
.envelope-card {
    background: rgba(255, 255, 255, 0.95);
    border-radius: 24px;
    padding: 30px;
    width: 100%;
    max-width: 400px;
    min-height: 350px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    border: 3px solid #ff4d6d;
    position: relative;
}
#letter-text {
    font-size: 18px;
    line-height: 1.6;
    color: #4a0010;
    font-weight: bold;
    text-align: left;
    white-space: pre-line;
}

/* Dynamic Ambient Floating Elements Background */
.heart-bg {
    position: absolute;
    font-size: 20px;
    animation: floatUp 6s linear infinite;
    opacity: 0.6;
    bottom: -50px;
    z-index: 1;
    user-select: none;
    pointer-events: none;
}
@keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
}

/* Bounce Micro-Interaction Physics */
.bounce-target {
    animation: bounceSelect 0.4s ease;
}
@keyframes bounceSelect {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
}

.hidden { display: none !important; }

</style>
</head>
<body>

<!-- SCREEN: TERMINAL INTERACTIVE BOOTLOADER -->
<div id="boot-screen">
    <div class="boot-terminal">
        <div>> initializing pukuOS v4.0.26...</div>
        <div id="boot-status" style="margin-top:5px;">> loading modules...</div>
        <div class="loading-track"><div id="boot-fill" class="loading-fill"></div></div>
    </div>
</div>

<!-- SCREEN: AUTH REGISTRATION ACCESS LAYER -->
<div id="login-screen" class="hidden">
    <div class="login-box">
        <h2>🔒 pukuOS Secure Login</h2>
        <p style="color:#666; font-size:14px;">Enter password to unlock conversation</p>
        <input type="password" id="passInput" placeholder="Password dekho..." />
        <button style="background:#ff4d6d; color:white; border-radius:10px;" onclick="verifyPassword()">Unlock 🔓</button>
    </div>
</div>

<!-- CONTAINER: APPLICATION CHAT CONVERSATION FRAME -->
<div class="phone-container">
    <div class="wa-header">
        <div class="wa-avatar">❤️</div>
        <div>
            <div>Amar Sona Puku</div>
            <div id="status-indicator" class="wa-status">online</div>
        </div>
    </div>

    <!-- Active Message Window Stream -->
    <div class="chat-window" id="chatWindow">
        <!-- Injected asynchronously via engine -->
    </div>

    <!-- Control Input Panel -->
    <div class="action-drawer" id="actionDrawer">
        <!-- Contextual control items populated via engine states -->
    </div>
</div>

<!-- SCREEN: SECRET LAYER COMPONENT -->
<div id="secret-letter-overlay" class="hidden">
    <div class="envelope-card">
        <h2 style="color:#ff4d6d; margin-top:0;">💌 Pure Love Note</h2>
        <div id="letter-text"></div>
    </div>
</div>

<script>
let foodChosen = "";
let punishments = [];
let textIndex = 0;
const yesTexts = ["Yes😠","Chotti?","Pabbi na dhotte😜","Thakte pabbina😂","Dhole dekha😏"];

// High fidelity Audio Synth Sound Engine Layer
let audioCtx = null;
function playSound(type) {
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);

        if (type === 'click') {
            osc.frequency.setValueAtTime(450, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        } else if (type === 'yum') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.25);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.25);
            osc.start(); osc.stop(audioCtx.currentTime + 0.25);
        } else if (type === 'pop') {
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.08);
            osc.start(); osc.stop(audioCtx.currentTime + 0.08);
        } else if (type === 'letter') {
            // Arpeggio background note loops for romantic atmosphere simulation
            let notes = [261.63, 329.63, 392.00, 523.25];
            notes.forEach((f, i) => {
                let o = audioCtx.createOscillator();
                let g = audioCtx.createGain();
                o.type = 'sine'; o.connect(g); g.connect(audioCtx.destination);
                o.frequency.setValueAtTime(f, audioCtx.currentTime + (i * 0.15));
                g.gain.setValueAtTime(0.04, audioCtx.currentTime + (i * 0.15));
                g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + (i * 0.15) + 0.4);
                o.start(audioCtx.currentTime + (i * 0.15)); o.stop(audioCtx.currentTime + (i * 0.15) + 0.4);
            });
        }
    } catch(e) {}
}

// Native Speech Synthesis Pipeline Execution
function speakSentence(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        let msg = new SpeechSynthesisUtterance(text);
        msg.rate = 0.9;
        msg.pitch = 1.1;
        window.speechSynthesis.speak(msg);
    }
}

// Startup Sequencer Simulation loop
window.addEventListener('DOMContentLoaded', () => {
    let fill = document.getElementById('boot-fill');
    let status = document.getElementById('boot-status');
    let width = 0;
    
    let interval = setInterval(() => {
        width += Math.floor(Math.random() * 12) + 4;
        if (width >= 100) {
            width = 100;
            clearInterval(interval);
            status.innerText = "> starting pukuOS loaded successfully!";
            setTimeout(() => {
                document.getElementById('boot-screen').classList.add('hidden');
                document.getElementById('login-screen').classList.remove('hidden');
            }, 600);
        }
        fill.style.width = width + '%';
        if(width > 40 && width < 75) status.innerText = "> mounting local configurations...";
        if(width >= 75) status.innerText = "> boot sequence finishing...";
    }, 100);
});

function verifyPassword() {
    let input = document.getElementById('passInput').value;
    if (input.toLowerCase() === 'labu') {
        playSound('pop');
        document.getElementById('login-screen').classList.add('hidden');
        startChatSession();
    } else {
        alert("Vul password! Hint: labu");
    }
}

// Background Floating System Configurator
function triggerFloatingHearts() {
    const symbols = ['❤️', '💖', '✨', '🌸', '💕'];
    setInterval(() => {
        const heart = document.createElement('div');
        heart.classList.add('heart-bg');
        heart.innerText = symbols[Math.floor(Math.random() * symbols.length)];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 3 + 4) + "s";
        heart.style.fontSize = (Math.random() * 15 + 20) + "px";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 6000);
    }, 450);
}

// Conversation Simulation Framework Engines
const win = document.getElementById('chatWindow');
const drawer = document.getElementById('actionDrawer');
const indicator = document.getElementById('status-indicator');

function updateStatus(isTyping) {
    indicator.innerText = isTyping ? "typing..." : "online";
    indicator.style.color = isTyping ? "#ffb3c1" : "#dcf8c6";
}

function renderIncomingBubble(text, htmlContent = "") {
    playSound('pop');
    let b = document.createElement('div');
    b.classList.add('bubble', 'incoming');
    b.innerHTML = htmlContent ? htmlContent : text;
    win.appendChild(b);
    win.scrollTop = win.scrollHeight;
}

function renderOutgoingBubble(text) {
    playSound('click');
    let b = document.createElement('div');
    b.classList.add('bubble', 'outgoing');
    b.innerText = text;
    win.appendChild(b);
    win.scrollTop = win.scrollHeight;
}

function startChatSession() {
    updateStatus(true);
    setTimeout(() => {
        updateStatus(false);
        renderIncomingBubble("🥺 Rag kole achis?");
        
        drawer.innerHTML = `
            <div class="runaway-wrap" id="s1-btns">
                <button class="reply-btn" style="width:auto; display:inline-block;" onclick="selectRagNo(this)">Ekdm Na😇</button>
                <button class="btn-no-run" id="yesBtn" style="left:160px; top:0px;" ontouchstart="runAway(event)" onmouseover="runAway(event)">Yes 😈</button>
            </div>
        `;
    }, 1500);
}

function runAway(e){
    e.preventDefault();
    const btn = document.getElementById("yesBtn");
    let randomX = Math.floor(Math.random() * 180);
    let randomY = Math.floor(Math.random() * 20);
    btn.style.left = randomX + "px";
    btn.style.top = randomY + "px";
    btn.innerText = yesTexts[textIndex++ % yesTexts.length];
    playSound('click');
}

function selectRagNo(btn) {
    btn.classList.add('bounce-target');
    drawer.innerHTML = "";
    renderOutgoingBubble("Ekdm Na😇");
    
    confetti({ particleCount: 60, spread: 60, origin: { y: 0.8 } });

    // 3 Second Tab Transition Delay
    setTimeout(() => {
        updateStatus(true);
        setTimeout(() => {
            updateStatus(false);
            speakSentence("Ki khaba bacha?");
            renderIncomingBubble("🍽️ Ki khaba Bachu");
            
            // Render Option reply structures with embedded media graphic assets
            drawer.innerHTML = `
                <button class="reply-btn" onclick="selectFood(this, 'Fich Fry','Darao anchi OM theke')"><img class="inline-food-img" src="https://images.unsplash.com/photo-1574316071802-0d684efa7bf5?w=400&auto=format&fit=crop&q=60">Fish Fry Khabi? 🐟</button>
                <button class="reply-btn" onclick="selectFood(this, '🍜 Chow and Mau','Yummy noodles 😋')"><img class="inline-food-img" src="https://images.unsplash.com/photo-1585032226651-759b368d7246?w=400&auto=format&fit=crop&q=60">Mix Schezwuan Chow 🍜</button>
                <button class="reply-btn" onclick="selectFood(this, '🍔 Burgir','Cholo kheye achi🍔🔥')"><img class="inline-food-img" src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400&auto=format&fit=crop&q=60">Burgir Khaba 🥹</button>
                <button class="reply-btn" onclick="selectFood(this, '🍨 Ice Cream hmmm','Paisa kom ache but tomar jonno sob🥹')"><img class="inline-food-img" src="https://images.unsplash.com/photo-1501443762994-82bd5dace89a?w=400&auto=format&fit=crop&q=60">Arun kakur Ice cream? 🍨</button>
                <button class="reply-btn" onclick="selectFood(this, '😍 Paisar ovab😭','Tomar jonno sob kichu bachhu')"><img class="inline-food-img" src="https://images.unsplash.com/photo-1520201163981-8cc95007dd2a?w=400&auto=format&fit=crop&q=60">Sob 😡</button>
            `;
        }, 1500);
    }, 3000);
}

function selectFood(btn, f, t) {
    playSound('yum');
    btn.classList.add('bounce-target');
    foodChosen = f;
    drawer.innerHTML = "";
    renderOutgoingBubble(btn.innerText);

    setTimeout(() => {
        renderIncomingBubble(t);
        
        // 3 Second Tab Transition Delay
        setTimeout(() => {
            updateStatus(true);
            setTimeout(() => {
                updateStatus(false);
                renderIncomingBubble("😏 Pick punishments (Ekta ba Duto ba Tinte)");
                
                drawer.innerHTML = `
                    <div style="display:flex; flex-direction:column; gap:4px; width:100%;">
                        <button class="reply-btn" onclick="togglePunishment(this,'Puku 💆🏻‍♀️')">Puku massage 💆🏻‍♀️💖</button>
                        <button class="reply-btn" onclick="togglePunishment(this,'Full body Kissu 😘')">Full body Kiss 😘</button>
                        <button class="reply-btn" onclick="togglePunishment(this,'Back Massage 15 min💆')">Back Massage 💆15 min</button>
                        <button class="reply-btn" onclick="togglePunishment(this,'Ghurte giye Ice cream khawa')">Continuous Ice Cream 🍦</button>
                        <button class="reply-btn" onclick="toggleGram(this,'Queen Treatment👑')">Rani Treatment👑</button>
                        <button class="reply-btn" onclick="togglePunishment(this,'Bike chalano sekha🏍️')">Bike chalano sekha🏍️</button>
                        <button style="background:#ff4d6d; color:white; border-radius:10px; margin-top:5px;" onclick="submitPunishments()">Next ➡️</button>
                    </div>
                `;
            }, 1500);
        }, 3000);
    }, 1000);
}

function togglePunishment(btn, val) {
    playSound('click');
    btn.classList.toggle('active');
    btn.classList.add('bounce-target');
    setTimeout(() => btn.classList.remove('bounce-target'), 400);

    if(punishments.includes(val)){
        punishments = punishments.filter(x => x !== val);
    } else {
        punishments.push(val);
    }
}

function submitPunishments() {
    drawer.innerHTML = "";
    renderOutgoingBubble("Selected punishments: " + (punishments.join(", ") || "None"));

    // 3 Second Tab Transition Delay
    setTimeout(() => {
        updateStatus(true);
        setTimeout(() => {
            updateStatus(false);
            renderIncomingBubble("💌 Ar kichu bacha 🫠?");
            
            drawer.innerHTML = `
                <textarea id="msgInput" placeholder="lekho ekhane...." style="width:100%; height:60px; border-radius:10px; border:2px solid #ffb3c1; padding:8px; resize:none; outline:none;"></textarea>
                <button style="background:#ff4d6d; color:white; border-radius:10px;" onclick="submitCustomMessage()">Magic Card 💖</button>
            `;
        }, 1500);
    }, 3000);
}

function submitCustomMessage() {
    let textVal = document.getElementById('msgInput').value;
    drawer.innerHTML = "";
    renderOutgoingBubble(textVal || "No custom text added");

    // 3 Second Tab Transition Delay
    setTimeout(() => {
        updateStatus(true);
        setTimeout(() => {
            updateStatus(false);
            speakSentence("Labuu card is ready...");
            
            // Output standalone container generation directly appended seamlessly into flow
            const finalCardHTML = `
                <div id="downloadable-card-area">
                    <h2 style="margin-top:0; color:#ff4d6d; text-align:center;">💖 Labuu Card</h2>
                    <div id="result">
                        <div class="warning-msg">😏 "Ebarer moto chere dilam, porer bar kore dekh"</div>
                        🍽️ <b>Food:</b> ${foodChosen || "Kichu na 🥺"}<br><br>
                        😏 <b>Punishments:</b> ${punishments.join(" ar ") || "None 😇"}<br><br>
                        💌 <b>Message:</b> ${textVal || "No message 😭"}
                    </div>
                </div>
            `;
            renderIncomingBubble("", finalCardHTML);

            // Explosive generation burst pattern initialization
            let end = Date.now() + (2 * 1000);
            (function frame() {
              confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff4d6d', '#ffb3c1'] });
              confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff4d6d', '#ffb3c1'] });
              if (Date.now() < end) requestAnimationFrame(frame);
            }());

            setTimeout(() => { downloadCard(); }, 600);

            // Append final conditional workflow unlock pathways
            drawer.innerHTML = `
                <button class="fallback-btn" style="background:#28a745; color:white; margin-bottom:5px;" onclick="downloadCard()">Eta patha whatsapp ee 📱</button>
                <button style="background:#9c27b0; color:white; animation: pulse 1.5s infinite;" onclick="openSecretLetter()">🎁 Open Secret Letter</button>
            `;
        }, 1500);
    }, 3000);
}

function downloadCard() {
    const cardArea = document.getElementById('downloadable-card-area');
    if(!cardArea) return;
    html2canvas(cardArea, { backgroundColor: '#ffffff', scale: 2 }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'Labuu_Card.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
}

function openSecretLetter() {
    document.getElementById('secret-letter-overlay').classList.remove('hidden');
    triggerFloatingHearts();
    
    // Continuous synth arpeggio simulation loops safely on tick update window frames
    let bgMusicInterval = setInterval(() => {
        playSound('letter');
    }, 800);

    const letterContent = `Dear Puku,

    You are the absolute best thing that ever happened to me. Thank you for always being my cute little bachha, my partner in crime, and my favorite person to tease. 

    Ebarer moto chere dilam, porer bar chotti dhorbo! I love you infinitely! ❤️`;

    let txtContainer = document.getElementById('letter-text');
    let idx = 0;
    
    function typeLetter() {
        if (idx < letterContent.length) {
            txtContainer.innerHTML += letterContent[idx];
            idx++;
            setTimeout(typeLetter, 45);
        }
    }
    typeLetter();
}
</script>
