<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Amar sona puku ??</title>

<!-- Included Canvas Confetti Library for the final Magic Card screen -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffe5ec,#ffc2d1);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    overflow:hidden;
    position: relative;
}

/* Floating background elements */
.heart-bg {
    position: absolute;
    font-size: 20px;
    animation: floatUp 6s linear infinite;
    opacity: 0.6;
    bottom: -50px;
    z-index: 0;
    user-select: none;
    pointer-events: none;
}

@keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
}

.card {
    background:#fff;
    padding:25px;
    border-radius:18px;
    width:90%;
    max-width:450px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.12);
    z-index: 10;
    transition: all 0.3s ease;
}

.hidden { display:none; }

h2 { color:#ff4d6d; }

.btn-container {
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
    position:relative;
    min-height:90px;
}

button {
    padding:10px 18px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    font-weight:bold;
    transition: transform 0.1s ease;
}

button:active { transform: scale(0.95); }

.btn-yes { background:#ff4d6d; color:#fff; }
.btn-no { background:#6c757d; color:#fff; position:absolute; transition: left 0.15s ease, top 0.15s ease; }

.option-btn {
    background:#fff0f3;
    border:2px solid #ffb3c1;
    color:#ff4d6d;
    padding:10px;
    border-radius:12px;
    margin:6px 0;
    width:100%;
    text-align: center;
    transition: all 0.2s ease;
}

.option-btn.active {
    background:#ff4d6d;
    color:#fff;
    border-color: #ff4d6d;
    transform: scale(1.02);
}

textarea {
    width:100%;
    height:80px;
    border-radius:10px;
    border:2px solid #ffb3c1;
    padding:10px;
    margin-top:10px;
    resize:none;
    outline: none;
}
textarea:focus { border-color: #ff4d6d; }

#reaction {
    height:20px;
    font-weight:bold;
    color:#ff4d6d;
    margin-bottom: 15px;
}

.next-btn {
    margin-top:15px;
    background:#ff4d6d;
    color:white;
    width: 100%;
}

#result {
    text-align: left;
    background: #fff0f3;
    padding: 15px;
    border-radius: 12px;
    border: 2px dashed #ffb3c1;
    margin-top: 15px;
    line-height: 1.6;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

</style>
</head>

<body>

<!-- SCREEN 1 -->
<div id="s1" class="card">
    <h2>?? Rag kole achis?</h2>

    <div class="btn-container">
        <button class="btn-yes" onclick="go2()">Ekdm Na??</button>

        <button class="btn-no" id="yesBtn"
            style="left: 160px; top: 0px;"
            ontouchstart="runAway(event)"
            onmouseover="runAway(event)">
            Yes ??
        </button>
    </div>
</div>

<!-- SCREEN 2 FOOD -->
<div id="s2" class="card hidden">
    <h2>???Ki khaba Bachu</h2>

    <p id="reaction"></p>

    <div>
        <button class="option-btn" onclick="food('Fich Fry','Darao anchi OM theke')">Fish Fry Khabi? ??</button>
        <button class="option-btn" onclick="food('?? Chow and Mau','Yummy noodles ??')">Mix Schezwuan Chow ??</button>
        <button class="option-btn" onclick="food('?? Burgir','Cholo kheye achi????')">Burgir Khaba ??</button>
        <button class="option-btn" onclick="food('?? Ice Cream hmmm','Paisa kom ache but tomar jonno sob??')">Arun kakur Ice cream? ??</button>
        <button class="option-btn" onclick="food('?? Paisar ovab??','Tomar jonno sob kichu bachhu')">Sob ??</button>
    </div>
</div>

<!-- SCREEN 3 PUNISHMENT -->
<div id="s3" class="card hidden">
    <h2>?? Pick punishments (Ekta ba Duto ba Tinte)</h2>

    <button class="option-btn" onclick="toggle(this,'Puku ???????')">Puku massage ?????????</button>
    <button class="option-btn" onclick="toggle(this,'Full body Kissu ??')">Full body Kiss ??</button>
    <button class="option-btn" onclick="toggle(this,'Back Massage 15 min??')">Back Massage ??15 min</button>
    <button class="option-btn" onclick="toggle(this,'Ghurte giye Ice cream khawa')">Continuous Ice Cream ??</button>
    <button class="option-btn" onclick="toggle(this,'Queen Treatment??')">Rani Treatment??</button>
    <button class="option-btn" onclick="toggle(this,'Bike chalano sekha???')">Bike chalano sekha???</button>

    <button class="next-btn" onclick="go4()">Next ??</button>
</div>

<!-- SCREEN 4 CUSTOM -->
<div id="s4" class="card hidden">
    <h2>?? Ar kichu bacha ???</h2>

    <textarea id="msg" placeholder="lekho ekhane...."></textarea>

    <button class="next-btn" onclick="final()">Magic Card ??</button>
</div>

<!-- SCREEN 5 CARD -->
<div id="s5" class="card hidden">
    <h2>?? Labuu Card</h2>

    <div id="result"></div>
</div>

<script>
let foodChosen = "";
let punishments = [];
let textIndex = 0;

const yesTexts = ["Yes??","Chotti?","Pabbi na dhotte??","Thakte pabbina??","Dhole dekha??"];

// Dynamic Ambient Floating Background System
const expressions = ['??', '??', '?', '??', '??', '??'];
setInterval(() => {
    const heart = document.createElement('div');
    heart.classList.add('heart-bg');
    heart.innerText = expressions[Math.floor(Math.random() * expressions.length)];
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 4) + "s";
    heart.style.fontSize = (Math.random() * 15 + 15) + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 7000);
}, 600);

function runAway(e){
    e.preventDefault();
    const btn = document.getElementById("yesBtn");
    
    let randomX = Math.floor(Math.random() * 240);
    let randomY = Math.floor(Math.random() * 60);

    btn.style.left = randomX + "px";
    btn.style.top = randomY + "px";

    btn.innerText = yesTexts[textIndex++ % yesTexts.length];
}

function go2(){
    s1.classList.add("hidden");
    s2.classList.remove("hidden");
}

function food(f,t){
    foodChosen = f;
    document.getElementById("reaction").innerText = t;

    setTimeout(()=>{
        s2.classList.add("hidden");
        s3.classList.remove("hidden");
    },800);
}

function toggle(el,val){
    el.classList.toggle("active");

    if(punishments.includes(val)){
        punishments = punishments.filter(x=>x!==val);
    } else {
        punishments.push(val);
    }
}

function go4(){
    s3.classList.add("hidden");
    s4.classList.remove("hidden");
}

function final(){
    let msg = document.getElementById("msg").value;

    s4.classList.add("hidden");
    s5.classList.remove("hidden");

    document.getElementById("result").innerHTML = `
        ??? <b>Food:</b> ${foodChosen || "Kichu na ??"}<br><br>
        ?? <b>Punishments:</b> ${punishments.join(", ") || "None ??"}<br><br>
        ?? <b>Message:</b> ${msg || "No message ??"}
    `;

    // High-effort celebratory heart explosion effect!
    let duration = 3 * 1000;
    let end = Date.now() + duration;

    (function frame() {
      confetti({
        particleCount: 3,
        angle: 60,
        spread: 55,
        origin: { x: 0 },
        colors: ['#ff4d6d', '#ffb3c1', '#ffccd5']
      });
      confetti({
        particleCount: 3,
        angle: 120,
        spread: 55,
        origin: { x: 1 },
        colors: ['#ff4d6d', '#ffb3c1', '#ffccd5']
      });

      if (Date.now() < end) {
        requestAnimationFrame(frame);
      }
    }());
}
</script>

</body>
</html>
